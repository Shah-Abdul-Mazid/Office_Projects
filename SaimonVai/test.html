<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SAIMON CLOUD CORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ff88;
  overflow:hidden;
}

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.container{
  padding:40px;
}

h1{
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

.line{
  margin:8px 0;
}

.status{
  color:#00ff00;
  font-weight:bold;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#00ff88;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00cc66;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>🚀 SAIMON CLOUD CORE</h1>

<div class="line">> Engineer: Md. Saimon Billah</div>
<div class="line">> OS: Ubuntu Linux</div>
<div class="line">> Web Server: Apache2</div>
<div class="line">> Firewall: UFW Secured</div>
<div class="line">> IP: 10.10.10.120</div>
<div class="line">> Status: <span class="status">ONLINE</span></div>
<div class="line">> Uptime: <span id="time"></span></div>

<button onclick="power()">EXECUTE SERVER POWER</button>

<div class="line" id="powerOutput"></div>
</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerHTML = new Date().toLocaleTimeString();
},1000);

function power(){
  document.getElementById("powerOutput").innerHTML =
  "> SYSTEM ACTIVE | SECURITY LEVEL MAXIMUM 🔥";
}

/* Matrix Background */
var canvas = document.getElementById("matrix");
var ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

var letters = "01";
letters = letters.split("");

var fontSize = 14;
var columns = canvas.width/fontSize;
var drops = [];
for(var x = 0; x < columns; x++)
  drops[x] = 1;

function draw(){
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";
  for(var i = 0; i < drops.length; i++){
    var text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;
    drops[i]++;
  }
}
setInterval(draw,33);
</script>

</body>
</html>
